global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "node-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["node-gateway:8000"]

  - job_name: "biometric-proxy"
    metrics_path: /metrics
    static_configs:
      - targets: ["biometric-proxy:8000"]

